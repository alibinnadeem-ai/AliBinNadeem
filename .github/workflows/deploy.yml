name: ABN Technologist CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build & Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npm run build
      - run: npm audit --audit-level=high
      - name: Check for secrets
        run: |
          if grep -r "SMTP_PASS\|DB_PASSWORD\|JWT_SECRET" --include="*.js" app/ lib/ database/ | grep -v "process.env"; then
            echo "Hardcoded secret detected!"; exit 1
          fi
          echo "No hardcoded secrets found"
